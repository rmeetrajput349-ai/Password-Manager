<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="card">
      <h2>📝 Register</h2>
      {% if error %}
      <p style= "color:red; font-weight:bold;">
        {{error}}
      </p>
      {% endif %}
      <form method="post">
        <input name="username" placeholder="Username" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />
        <button>Register</button>
      </form>
    </div>
  </body>
</html>
